                - paragraph [ref=e69]: "5"
                - paragraph [ref=e70]: A surplus means you have money left after paying for the things you needed.
              - generic [ref=e71]:
                - paragraph [ref=e72]: "7"
                - paragraph [ref=e73]: In a budget, a surplus means you planned some money for spending, but part of it did not get used.
              - generic [ref=e74]:
                - paragraph [ref=e75]: "9"
                - paragraph [ref=e76]: A budget surplus happens when income is higher than spending, or when spending ends up lower than expected. The leftover amount is the surplus.
              - generic [ref=e77]:
                - paragraph [ref=e78]: "12"
                - paragraph [ref=e79]: A budget surplus is the amount left when actual revenue or available funds are greater than actual spending over the same period. In a company or office budget, that usually means some planned money was not spent.
              - generic [ref=e80]:
                - paragraph [ref=e81]: "16"
                - paragraph [ref=e82]: A budget surplus is the positive balance that remains when revenue or allocated funds exceed expenditures for a defined period. It can result from higher-than-expected income, lower-than-expected costs, delayed purchases, or deliberate underspending, and the next question is usually whether to save it, reallocate it, or return it.
